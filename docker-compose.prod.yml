services:

  wire:
    build:
      context: .
      dockerfile: saving/Dockerfile
    environment:
      SAVING_DB: ${SAVING_DB}
    ports:
      - "7474:7474"
    restart: unless-stopped
    networks: [app]

  authservice:
    build:
      context: .
      dockerfile: authservice/Dockerfile
    environment:
      WIRE_ADDR: wire:7474
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
    networks: [app]
    depends_on: [wire]

  merchants:
    build:
      context: .
      dockerfile: Merchants/Dockerfile
    environment:
      MERCHANTS_DB: /data/merchants.db
    volumes:
      - merchants_data:/data
    restart: unless-stopped
    networks: [app]

  tomcats:
    build:
      context: .
      dockerfile: Tomcats/Dockerfile
    environment:
      AUTH_URL:     http://authservice:8091
      WIRE_ADDR:    wire:7474
      AMQP_URL:     ${AMQP_URL}
      JWT_SECRET:   ${JWT_SECRET}
      TOMCATS_ADDR:    :8093
      STATIC_DIR:      /app/static
      MERCHANTS_URL:   http://merchants:8090
      FLOAT_PWD:       ${FLOAT_PWD:-float123}
    ports:
      - "127.0.0.1:8093:8093"
    restart: unless-stopped
    networks: [app]
    depends_on: [wire, authservice, merchants]

networks:
  app:
    driver: bridge

volumes:
  merchants_data:
