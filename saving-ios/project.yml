name: Saving
options:
  bundleIdPrefix: dev.nivic
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO

targets:
  Saving:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Saving
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nivic.saving
        INFOPLIST_FILE: App/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: App/Saving.entitlements
